spring:
  application:
    name: gateway-service
  cloud:
    config:
      fail-fast: false
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: video-service
          uri: lb://video-service
          predicates:
            - Path=/api/videos/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

server:
  port: ${SERVER_PORT:8080}
