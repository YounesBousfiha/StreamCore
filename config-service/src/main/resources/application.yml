spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: https://github.com/YounesBousfiha/StreamCore-config-service

server:
  port: 8888

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

